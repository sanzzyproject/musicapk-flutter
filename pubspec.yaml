name: sannmusic_apk
description: "SANN404 FORUM Music Web Player wrapped in Flutter APK"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Library utama untuk WebView modern
  webview_flutter: ^4.7.0

  # Untuk menangani tautan eksternal (seperti "Join Saluran" WhatsApp)
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
